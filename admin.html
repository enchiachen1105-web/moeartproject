<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>

  :root{
    --bg:#FAF6F0;
    --surface:#FFFFFF;
    --border:#E8E1D6;
    --ink:#2A2622;
    --ink-soft:#6B6358;
    --ink-faint:#A39C8F;
    --accent:#BD5B38;
    --accent-dark:#9A4527;
    --accent-soft:#F3D9C9;
    --teal:#1F4E4A;
    --teal-soft:#D2E4DF;
    --danger:#A3403A;
    --radius:10px;
    --shadow:0 1px 2px rgba(42,38,34,0.06), 0 4px 16px rgba(42,38,34,0.05);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Noto Sans TC',sans-serif;
    -webkit-font-smoothing:antialiased;
    line-height:1.5;
  }
  h1,h2,h3{font-family:'Noto Serif TC',serif; margin:0; font-weight:700;}
  .app{max-width:1080px; margin:0 auto; padding:20px 18px 80px;}

  .topbar{display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:18px; flex-wrap:wrap;}
  .topbar .brand{display:flex; align-items:baseline; gap:10px;}
  .topbar h1{font-size:21px; color:var(--ink);}
  .topbar .tag{font-size:12px; color:var(--ink-faint); border:1px solid var(--border); border-radius:99px; padding:2px 10px; white-space:nowrap;}

  .tabs{display:flex; gap:6px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:4px; margin-bottom:20px; box-shadow:var(--shadow);}
  .tab-btn{flex:1; border:none; background:transparent; padding:10px 14px; border-radius:7px; font-size:14px; font-weight:700; color:var(--ink-soft); cursor:pointer; font-family:inherit; transition:background .15s,color .15s;}
  .tab-btn.active{background:var(--ink); color:#fff;}
  .tab-btn:not(.active):hover{background:var(--bg); color:var(--ink);}

  .panel{display:none;}
  .panel.active{display:block;}

  .card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); box-shadow:var(--shadow); padding:20px; margin-bottom:16px;}
  .card-title{font-size:15px; color:var(--ink); margin-bottom:14px; display:flex; align-items:center; gap:8px;}
  .card-title .num{display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; background:var(--teal); color:#fff; font-size:11px; font-family:'Noto Sans TC'; font-weight:700;}

  label{display:block; font-size:12.5px; color:var(--ink-soft); margin-bottom:4px; font-weight:500;}
  input[type=text], input[type=tel], input[type=date], input[type=time], select, textarea{
    width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:7px;
    background:#fff; color:var(--ink); font-size:14px; font-family:inherit;
  }
  input[readonly]{background:var(--bg); color:var(--ink-soft);}
  input:focus, select:focus, textarea:focus{outline:2px solid var(--teal); outline-offset:1px; border-color:var(--teal);}
  textarea{resize:vertical; min-height:46px;}
  .s-date-y, .s-date-m, .s-date-d{padding:9px 4px; min-width:0; text-align:center;}

  .grid-row{display:grid; gap:10px; margin-bottom:14px;}
  .grid-4{grid-template-columns:repeat(4,1fr);}
  .grid-3{grid-template-columns:repeat(3,1fr);}
  .grid-2{grid-template-columns:repeat(2,1fr);}
  @media (max-width:680px){
    .grid-4{grid-template-columns:1fr 1fr;}
    .grid-3{grid-template-columns:1fr;}
    .grid-2{grid-template-columns:1fr;}
  }

  .btn{display:inline-flex; align-items:center; gap:6px; border:none; border-radius:7px; padding:10px 16px; font-size:14px; font-weight:700; cursor:pointer; font-family:inherit; transition:opacity .15s, transform .05s;}
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}
  .btn:disabled:active{transform:none;}
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:hover{background:var(--accent-dark);}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--border);}
  .btn-ghost.active{background:var(--ink); color:#fff; border-color:var(--ink);}
  .btn-ghost:hover{background:var(--bg); color:var(--ink);}
  .btn-teal{background:var(--teal); color:#fff;}
  .btn-teal:hover{opacity:.88;}
  .btn-danger-text{background:transparent; color:var(--danger); border:none; font-size:13px; padding:4px 6px;}
  .btn-sm{padding:6px 10px; font-size:13px;}
  .btn-row{display:flex; gap:10px; flex-wrap:wrap; align-items:center;}

  .session-card{border:1px solid var(--border); border-radius:9px; padding:14px; margin-bottom:10px; background:#FCFAF7; position:relative; transition:box-shadow .15s;}

  .hours-bar{display:flex; align-items:center; gap:12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 14px; margin-bottom:14px;}
  .hours-bar-label{font-size:12.5px; color:var(--ink-soft); font-weight:600; white-space:nowrap;}
  .hours-bar-value{font-size:15px; font-weight:700; color:var(--ink);}
  .hours-bar-sep{font-weight:400; color:var(--ink-faint);}
  @keyframes highlight-pulse{0%{box-shadow:0 0 0 3px var(--teal);}70%{box-shadow:0 0 0 6px rgba(31,78,74,0);}100%{box-shadow:none;}}
  .session-card.highlight{animation:highlight-pulse 1.2s ease-out;}
  .session-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .session-head .label{font-size:12.5px; font-weight:700; color:var(--teal);}
  .session-hours{font-size:12px; color:var(--ink-faint);}
  .conflict-badge{font-size:12px; font-weight:700; color:#2255AA; display:none;}
  .conflict-badge.show{display:inline;}
  .session-num{color:var(--ink-faint); font-weight:700;}

  select:disabled, input:disabled{background:var(--bg); color:var(--ink-soft); cursor:not-allowed; opacity:.85;}
  .session-card.locked-card{background:#F6F2EC;}
  .lock-note{font-size:11.5px; color:var(--ink-faint); display:flex; align-items:center; gap:4px;}

  .multi-entry-section{margin-bottom:16px;}
  .multi-entry-summary{display:flex; align-items:center; justify-content:space-between; padding:9px 10px; border:1px solid var(--border); border-radius:7px; background:#fff; cursor:pointer; font-size:14px; color:var(--ink);}
  .multi-entry-summary .expand-arrow{color:var(--ink-faint); font-size:12px; transition:transform .15s;}
  .multi-entry-summary.open .expand-arrow{transform:rotate(180deg);}
  .multi-entry-body{margin-top:8px;}
  .entry-row{display:flex; gap:8px; align-items:center; margin-bottom:8px;}
  .entry-row input{flex:1;}

  .modal-overlay{position:fixed; inset:0; background:rgba(42,38,34,0.55); display:flex; align-items:center; justify-content:center; z-index:200; padding:20px;}
  .modal-box{background:#fff; border-radius:12px; padding:22px; max-width:440px; width:100%; box-shadow:0 12px 48px rgba(0,0,0,0.25);}
  .modal-box h3{font-family:'Noto Serif TC',serif; font-size:17px; margin-bottom:6px;}
  .modal-box textarea{width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:7px; font-size:14px; font-family:inherit; resize:vertical;}
  .quick-reason-row{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; font-size:13px; color:var(--ink-soft);}
  .quick-reason-row label{display:inline-flex; align-items:center; gap:4px; cursor:pointer; white-space:nowrap;}
  .quick-reason-row input{width:14px; height:14px; margin:0;}

  .changelog-item{display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--border); font-size:13.5px;}
  .changelog-item:last-child{border-bottom:none;}
  .changelog-item.conflict{background:#FDF1EF; border-radius:8px; padding:10px; border-bottom:none; margin-bottom:8px;}
  .changelog-meta{flex-shrink:0; width:140px; color:var(--ink-soft); font-size:12px;}
  .changelog-diff div{margin-bottom:2px;}
  .changelog-diff s{color:var(--ink-faint);}

  .empty-state{text-align:center; padding:36px 20px; color:var(--ink-faint);}
  .empty-state .big{font-size:32px; margin-bottom:8px;}

  .toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(10px); background:var(--ink); color:#fff; padding:11px 20px; border-radius:16px; font-size:13.5px; box-shadow:var(--shadow); opacity:0; pointer-events:none; transition:opacity .25s, transform .25s; z-index:50; max-width:min(92vw, 460px); white-space:normal; line-height:1.5; text-align:center;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* admin */
  .stat-row{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:16px;}
  .stat-box{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; box-shadow:var(--shadow);}
  .stat-box .v{font-family:'Noto Serif TC',serif; font-size:24px; font-weight:700; color:var(--teal);}
  .stat-box .l{font-size:12px; color:var(--ink-soft); margin-top:2px;}
  @media (max-width:640px){.stat-row{grid-template-columns:1fr;}}

  .filter-bar{display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-bottom:14px;}
  .filter-bar .field{min-width:160px;}

  .view-toggle{display:flex; gap:6px; flex-wrap:wrap;}
  .view-toggle .btn.active{background:var(--ink); color:#fff; border-color:var(--ink);}

  .month-filter-row{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:14px;}
  .month-tab{font-size:12.5px; padding:6px 13px; border-radius:99px; border:1px solid var(--border); background:#fff; cursor:pointer; font-family:inherit; color:var(--ink-soft);}
  .month-tab[data-month="all"]{border-color:var(--ink); color:var(--ink); font-weight:700;}
  .month-tab[data-month="all"].active{background:var(--ink); color:#fff;}
  .month-tab.sem-upper{border-color:var(--accent); color:var(--accent-dark);}
  .month-tab.sem-upper.active{background:var(--accent); color:#fff; font-weight:700;}
  .month-tab.sem-lower{border-color:var(--teal); color:var(--teal);}
  .month-tab.sem-lower.active{background:var(--teal); color:#fff; font-weight:700;}

  .legend{display:flex; gap:12px; flex-wrap:wrap; font-size:11.5px; color:var(--ink-soft); align-items:center; margin:10px 0 14px;}
  .legend-item{display:inline-flex; align-items:center; gap:4px; white-space:nowrap;}
  .legend-swatch{display:inline-block; width:10px; height:10px; border-radius:3px; flex-shrink:0;}
  .legend-dot{display:inline-block; width:8px; height:8px; border-radius:50%; flex-shrink:0;}
  .chip-link{font-size:12px; color:var(--teal); cursor:pointer; text-decoration:underline; background:none; border:none; font-family:inherit; padding:0;}

  /* visit checkboxes (list view) */
  .visit-check-group{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
  .visit-check-item{display:inline-flex; align-items:center; gap:3px; font-size:11.5px; color:var(--ink-soft); cursor:pointer; white-space:nowrap;}
  .visit-check-item input[type=checkbox]{accent-color:var(--vc-color); width:14px; height:14px; cursor:pointer; margin:0;}
  .repeat-tag{display:inline-flex; align-items:center; gap:3px; font-size:11px; font-weight:700; color:var(--accent-dark); background:var(--accent-soft); border-radius:99px; padding:2px 8px; white-space:nowrap;}

  /* visit flag dots (list view / month-list panel) */
  .flag-dot{width:5px; height:5px; border-radius:50%; display:inline-block; flex-shrink:0;}

  /* calendar day chips: category-colored block + school name, with a flush
     colored strip underneath showing any ticked visit flags */
  .day-chip-wrap{border-radius:4px; overflow:hidden; margin-bottom:2px; cursor:pointer;}
  .day-chip{
    display:flex; align-items:center; padding:1.5px 4px;
    font-size:10px; line-height:1.6; white-space:nowrap; overflow:hidden;
    color:#fff;
  }
  .day-chip-name{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0;}
  .day-chip-flagbar{display:flex; height:7px;}
  .day-chip-flagbar > span{flex:1;}
  @media (max-width:640px){
    .day-chip{font-size:8.5px; padding:1px 3px;}
    .day-chip-flagbar{height:6px;}
  }

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  thead th{text-align:left; font-size:12px; color:var(--ink-soft); border-bottom:2px solid var(--border); padding:8px 8px; white-space:nowrap;}
  tbody td{padding:9px 8px; border-bottom:1px solid var(--border); vertical-align:top;}
  tbody tr:hover{background:#FCFAF7;}
  .badge{display:inline-block; font-size:11.5px; font-weight:700; padding:2px 8px; border-radius:99px; white-space:nowrap;}
  .table-wrap{overflow-x:auto;}

  @media (max-width:720px){
    table thead{display:none;}
    table, tbody, tr, td{display:block; width:100%;}
    tbody tr{border:1px solid var(--border); border-radius:8px; margin-bottom:10px; padding:8px 10px;}
    tbody td{border:none; padding:4px 0; display:flex; justify-content:space-between; gap:10px;}
    tbody td::before{content:attr(data-label); font-size:11.5px; color:var(--ink-faint); font-weight:700; flex-shrink:0;}
  }

  /* calendar */
  .cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
  .cal-head .month-label{font-family:'Noto Serif TC',serif; font-size:17px; font-weight:700;}
  .cal-nav{display:flex; gap:6px;}
  .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:4px;}
  .cal-dow{text-align:center; font-size:11.5px; color:var(--ink-faint); padding:4px 0; font-weight:700;}
  .cal-cell{min-height:96px; border:1px solid var(--border); border-radius:7px; padding:5px 5px; background:#fff; cursor:pointer; overflow:visible;}
  .cal-cell.micro{min-height:28px; padding:2px 3px;}
  .cal-cell.micro .d{font-size:10px; margin-bottom:0;}
  .cal-cell.micro .day-chip{font-size:7px; padding:0.5px 2px;}
  .year-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:18px;}
  @media(max-width:720px){.year-grid{grid-template-columns:repeat(2,1fr);}}
  @media(max-width:480px){.year-grid{grid-template-columns:1fr;}}
  .mini-month-card{border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; cursor:pointer; background:#fff; transition:box-shadow .15s;}
  .mini-month-card:hover{box-shadow:0 0 0 2px var(--teal);}
  .mini-month-header{display:flex; align-items:center; justify-content:space-between; padding:8px 10px; font-size:13px; font-weight:700; cursor:pointer;}
  .mini-month-header.sem-upper{background:var(--accent); color:#fff;}
  .mini-month-header.sem-lower{background:var(--teal); color:#fff;}
  .mini-month-body{padding:4px;}
  .micro-dow-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px; margin-bottom:2px;}
  .micro-dow{text-align:center; font-size:9px; color:var(--ink-faint); font-weight:700;}
  .micro-cell-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px;}
  .micro-cell{min-height:20px; font-size:9px; color:var(--ink-soft); text-align:center; padding:1px; border-radius:3px; position:relative;}
  .micro-cell.out{opacity:.3;}
  .micro-cell.has-event{background:rgba(0,0,0,.04);}
  .micro-cell .dot-row{display:flex; justify-content:center; gap:1px; flex-wrap:wrap;}
  .micro-cell .micro-dot{width:4px; height:4px; border-radius:50%; flex-shrink:0;}
  .cal-cell.out{background:var(--bg); opacity:.45;}
  .cal-cell.selected{border-color:var(--teal); box-shadow:0 0 0 2px rgba(31,78,74,.18) inset;}
  .cal-cell .d{font-size:12px; color:var(--ink-soft); font-weight:700; margin-bottom:3px;}
  .cal-cell.today .d{color:var(--accent);}
  @media (max-width:640px){.cal-cell{min-height:74px; padding:3px 3px;} .cal-cell .d{font-size:10.5px; margin-bottom:1px;}}

  .ev-item{display:flex; gap:10px; padding:9px 0; border-bottom:1px solid var(--border); font-size:13.5px;}
  .ev-item:last-child{border-bottom:none;}
  .ev-time{flex-shrink:0; width:118px; color:var(--ink-soft); font-size:12.5px; padding-top:1px; line-height:1.5;}
  .ev-main .sname{font-weight:700;}
  .ev-main .meta{font-size:12px; color:var(--ink-soft); margin-top:2px;}

  .school-picker-row{display:flex; gap:10px; align-items:flex-end; flex-wrap:wrap; margin-bottom:16px;}
  .help-text{font-size:12px; color:var(--ink-faint); margin-top:-8px; margin-bottom:14px;}
  .section-divider{border:none; border-top:1px solid var(--border); margin:18px 0;}
  .updated-note{font-size:12px; color:var(--ink-faint); margin-top:2px;}

  .loading-msg{text-align:center; padding:60px 0; color:var(--ink-faint); font-size:13.5px;}

.tabs{display:none !important;}
</style>
<title>總覽彙整 — 藝師藝有計畫 115學年度</title>
</head>
<body>
<div class="layout"><div class="main">
  <div class="top-bar"><div class="brand">教育部 · 藝師藝有計畫 115學年度 · 總覽彙整</div></div>
  <div id="loading" class="loading-msg">載入資料中…</div>
  <div id="content" style="display:none;">
    <div class="stat-row">
        <div class="stat-box"><div class="v" id="statSchools">0 / 32</div><div class="l">已填表學校數</div></div>
        <div class="stat-box"><div class="v" id="statVisitedS1">0 / 32</div><div class="l">上學期已訪視校次</div></div>
        <div class="stat-box"><div class="v" id="statVisitedS2">0 / 32</div><div class="l">下學期已訪視校次</div></div>
      </div>

      <div class="card" id="changeLogCard">
        <div class="card-title" style="justify-content:space-between; display:flex; flex-wrap:wrap; gap:8px;">
          <span>課程異動通知 <span id="changeLogUnreadBadge" class="badge" style="background:var(--danger); color:#fff; display:none;"></span></span>
          <button class="btn btn-ghost btn-sm" id="changeLogShowAllBtn">顯示全部</button>
        </div>
        <p class="help-text" style="margin-top:-4px;">學校修改已鎖定的課程場次時會留下紀錄。標紅色的代表那筆場次原本已排定訪視，請特別確認。</p>
        <div id="changeLogBody"></div>
      </div>

      <div class="card">
        <div class="card-title">篩選條件</div>
        <div class="filter-bar">
          <div class="field">
            <label for="schoolNameFilter">學校名稱</label>
            <select id="schoolNameFilter">
              <option value="">全部學校</option>
            </select>
          </div>
          <div class="field" style="flex:0 0 140px;">
            <label for="categoryFilter">類別</label>
            <select id="categoryFilter">
              <option value="">全部類別</option>
              <option value="音樂班">音樂班</option>
              <option value="舞蹈班">舞蹈班</option>
              <option value="美術班">美術班</option>
              <option value="普通班">普通班</option>
            </select>
          </div>
          <div class="field" style="flex:0 0 140px;">
            <label for="semesterFilter">學期</label>
            <select id="semesterFilter">
              <option value="">全部學期</option>
              <option value="上學期">上學期</option>
              <option value="下學期">下學期</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">彙整結果</div>
        <div class="legend" id="colorLegend"></div>

        <div class="month-filter-row" id="adminMonthFilterRow"></div>

        <div class="view-toggle" style="margin-bottom:12px;">
          <button class="btn btn-ghost btn-sm active" id="viewListBtn">📋 清單檢視</button>
          <button class="btn btn-ghost btn-sm" id="viewCalBtn">📅 月曆檢視</button>
        </div>

        <div id="listView">
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>日期</th><th>時間</th><th>學校</th><th>學期</th><th>隨課老師</th><th>授課藝師</th><th>地點</th><th>訪視標記</th></tr>
              </thead>
              <tbody id="listTbody"></tbody>
            </table>
          </div>
          <div id="listEmpty" class="empty-state" style="display:none;">
            <div class="big">📭</div>尚無符合篩選條件的課程場次
          </div>
        </div>

        <div id="calView" style="display:none;">
          <div class="legend" style="margin-bottom:12px;">
            <span class="legend-item"><span class="legend-swatch" style="background:var(--accent);"></span>上學期</span>
            <span class="legend-item"><span class="legend-swatch" style="background:var(--teal);"></span>下學期</span>
          </div>

          <!-- 單月詳細 -->
          <div id="adminCalSingle">
            <div class="cal-head">
              <div class="cal-nav"><button class="btn btn-ghost btn-sm" id="calPrev">‹ 上月</button></div>
              <div class="month-label" id="calMonthLabel"></div>
              <div class="cal-nav"><button class="btn btn-ghost btn-sm" id="calNext">下月 ›</button></div>
            </div>
            <div class="cal-grid" id="calDow"></div>

            <div class="card" id="monthListPanel" style="margin-top:14px;">

function computeHours(start, end){
  if(!start || !end) return 0;
  const [sh,sm] = start.split(':').map(Number);
  const [eh,em] = end.split(':').map(Number);
  if(isNaN(sh)||isNaN(eh)) return 0;
  let mins = (eh*60+em) - (sh*60+sm);
  if(mins < 0) mins = 0;
  return Math.round((mins/60)*10)/10;
}

function daysInMonth(year, month){ return new Date(year, month, 0).getDate(); }

// Builds a 'YYYY-MM-DD' string from local calendar components WITHOUT going
// through UTC. Using Date.toISOString() here would shift the date by the
// timezone offset (e.g. Taiwan UTC+8 turns 9/15 00:00 into 9/14 16:00 UTC →
// wrong day), which caused calendar chips to land on the wrong date.
function toDateKey(y, m1based, d){
  return `${y}-${String(m1based).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}
function todayDateKey(){
  const t = new Date();
  return toDateKey(t.getFullYear(), t.getMonth()+1, t.getDate());
}

function yearsForSemester(semester){
  const months = SEMESTER_MONTHS[semester] || [];
  return [...new Set(months.map(m=>m[0]))];
}
function monthsForSemesterYear(semester, year){
  const months = SEMESTER_MONTHS[semester] || [];
  return months.filter(m=>m[0]===year).map(m=>m[1]);
}

// Rebuilds the 年/月/日 dropdowns for a session row to only offer years and
// months that belong to the row's current semester (e.g. 上學期 only ever
// offers 2026/08–2026/12 and 2027/01) — far more reliable across browsers
// than relying on a native date input's min/max.
// Builds <option> HTML for a person <select> (授課藝師/隨課老師), sourced
// from the school's configured list. If the session's current value isn't
// in that list (e.g. removed after the session was set), it's still shown
// as a trailing extra option so the data isn't silently lost from view.
function buildPersonOptionsHTML(list, currentValue){
  const items = (Array.isArray(list) ? list : []).filter(Boolean);
  let html = '<option value="">請選擇…</option>';
  items.forEach(name=>{
    html += `<option value="${escapeHtml(name)}"${name===currentValue?' selected':''}>${escapeHtml(name)}</option>`;
  });
  if(currentValue && !items.includes(currentValue)){
    html += `<option value="${escapeHtml(currentValue)}" selected>${escapeHtml(currentValue)}（非現有名單）</option>`;
  }
  return html;
}

}

  }

  ySel.innerHTML = '<option value="">年</option>' + years.map(yy=>`<option value="${yy}">${yy}</option>`).join('');
  ySel.value = years.includes(y) ? String(y) : '';

  mSel.innerHTML = '<option value="">月</option>' + months.map(mm=>`<option value="${mm}">${mm}</option>`).join('');

// Builds a <option>/<optgroup> time picker covering 06:00–21:00 in 10-minute
// steps, grouped 上午 (06:00–11:50) above 下午 (12:00–21:00) within one select.
let _timeOptionsHTMLCache = null;
function buildTimeOptionsHTML(){
  if(_timeOptionsHTMLCache) return _timeOptionsHTMLCache;
  let html = '<option value="">請選擇…</option>';
  const periods = [
    {label:'上午', from:6*60, to:11*60+50},
    {label:'下午', from:12*60, to:21*60}
  ];
  periods.forEach(p=>{
    html += `<optgroup label="${p.label}">`;
    for(let m=p.from; m<=p.to; m+=10){
      const hh = String(Math.floor(m/60)).padStart(2,'0');
      const mm = String(m%60).padStart(2,'0');
      const val = `${hh}:${mm}`;
      html += `<option value="${val}">${val}</option>`;
    }
    html += '</optgroup>';
  });
  _timeOptionsHTMLCache = html;
  return html;
}

function fmtHoursTotal(n){

function weekdayZh(dateStr){
  if(!dateStr) return '';
  const d = new Date(dateStr+'T00:00:00');
  if(isNaN(d.getTime())) return '';
  const names = ['日','一','二','三','四','五','六'];
  return names[d.getDay()];
}

function fmtDateDisplay(dateStr){
  if(!dateStr) return '（未填日期）';
  const w = weekdayZh(dateStr);
  return dateStr.replace(/-/g,'/') + (w?` (${w})`:'');
}

function updateRowHours(wrap){
  const start = wrap.querySelector('.s-start').value;
  const end = wrap.querySelector('.s-end').value;
  const hoursEl = wrap.querySelector('.session-hours');
  if(start && end){
    const [sh,sm] = start.split(':').map(Number);
    const [eh,em] = end.split(':').map(Number);
    const mins = (eh*60+em) - (sh*60+sm);
    if(mins <= 0){
      hoursEl.innerHTML = '<span style="color:var(--danger);font-weight:700;">老師 再麻煩檢查一下課程時間喔!</span>';
      recalcTotals();
      return;
    }
  }
  const h = computeHours(start, end);
  hoursEl.textContent = h ? `${h} 小時` : '';
  recalcTotals();
}

// Keeps each session card's "N." label matching its current position in the list.
function renumberSessions(){

    const numEl = row.querySelector('.session-num');
    if(numEl) numEl.textContent = `${idx+1}.`;
  });

function timeRangesOverlap(aStart,aEnd,bStart,bEnd){
  return aStart < bEnd && bStart < aEnd;
}

// Flags any two session cards that share the same date with overlapping
// start/end times — both get a "■ 時間重複(N)" badge naming which row
// number(s) they clash with, in their top-right corner.
function checkSessionOverlaps(){
  const rows = $$('#sessionList .session-card');
  const infos = rows.map((row, idx)=>({
    row, num: idx+1,
    date: getSessionDateValue(row),
    start: row.querySelector('.s-start').value,
    end: row.querySelector('.s-end').value,
    conflictsWith: []
  }));
  for(let i=0;i<infos.length;i++){
    for(let j=i+1;j<infos.length;j++){
      const a = infos[i], b = infos[j];
      if(!a.date || !b.date || a.date!==b.date) continue;
      if(!a.start || !a.end || !b.start || !b.end) continue;
      if(timeRangesOverlap(a.start,a.end,b.start,b.end)){
        a.conflictsWith.push(b.num);
        b.conflictsWith.push(a.num);
      }
    }
  }
  infos.forEach(info=>{
    const badge = info.row.querySelector('.conflict-badge');
    if(info.conflictsWith.length>0){
      badge.textContent = `■ 時間重複(${info.conflictsWith.join('或')})`;
      badge.classList.add('show');
    }else{
      badge.classList.remove('show');
    }
  });
}

// Switches to list view and scrolls+highlights the session card whose
// data-id matches the given sessionCardId. Restores the correct month tab
// so the target card is actually visible (not filtered away).
function jumpToSession(sessionCardId, monthKey){
  // Switch to list view
  $('#sessionCalViewBtn').classList.remove('active');
  $('#sessionListViewBtn').classList.add('active');
  $('#sessionCalWrap').style.display = 'none';
  $('#sessionListWrap').style.display = 'block';
  // Make sure the card's month is showing
  if(monthKey && monthKey !== activeMonthFilter){
    activeMonthFilter = monthKey;
    renderMonthFilterRow();
    applySessionMonthFilter();
  }
  // Find the card and scroll into view
  const card = $$('#sessionList .session-card').find(c=>c.dataset.id===sessionCardId);
  if(!card) return;
  card.scrollIntoView({behavior:'smooth', block:'center'});
  card.classList.remove('highlight');
  void card.offsetWidth; // force reflow to restart animation
  card.classList.add('highlight');
  setTimeout(()=>card.classList.remove('highlight'), 1300);
}

// Single-month detailed calendar
function renderSchoolMiniCalendar(){
  if(formCalYear===undefined){ formCalYear = PROGRAM_START.y; formCalMonth = PROGRAM_START.m; }
  if(formCalYear*12+formCalMonth < PROGRAM_START.y*12+PROGRAM_START.m){ formCalYear=PROGRAM_START.y; formCalMonth=PROGRAM_START.m; }
  if(formCalYear*12+formCalMonth > PROGRAM_END.y*12+PROGRAM_END.m){ formCalYear=PROGRAM_END.y; formCalMonth=PROGRAM_END.m; }

  $('#schoolCalMonthLabel').textContent = `${formCalYear} 年 ${formCalMonth+1} 月`;
  $('#schoolCalPrev').disabled = (formCalYear*12+formCalMonth <= PROGRAM_START.y*12+PROGRAM_START.m);
  $('#schoolCalNext').disabled = (formCalYear*12+formCalMonth >= PROGRAM_END.y*12+PROGRAM_END.m);

  const dowEl = $('#schoolCalDow');
  dowEl.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(d=>{
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    dowEl.appendChild(el);
  });

  const sessions = getFormSessions();
  const byDate = {};
  sessions.forEach(s=>{ (byDate[s.date]=byDate[s.date]||[]).push(s); });

  const firstOfMonth = new Date(formCalYear, formCalMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonthCount = new Date(formCalYear, formCalMonth+1, 0).getDate();
  const todayStr = todayDateKey();

  const grid = $('#schoolCalGrid');
  grid.innerHTML = '';
  const totalCells = Math.ceil((startWeekday + daysInMonthCount)/7)*7;
  for(let i=0;i<totalCells;i++){
    const dayNum = i - startWeekday + 1;
    const cell = document.createElement('div');
    const inMonth = dayNum>=1 && dayNum<=daysInMonthCount;
    const dateKey = inMonth ? toDateKey(formCalYear, formCalMonth+1, dayNum) : '';
    cell.className = 'cal-cell' + (inMonth?'':' out') + (dateKey && dateKey===todayStr?' today':'');
    const dayEvents = (byDate[dateKey]||[]).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
    const mKey = inMonth ? `${formCalYear}-${String(formCalMonth+1).padStart(2,'0')}` : '';
    let chipsHtml = '';
    dayEvents.forEach(ev=>{
      const semColor = (ev.semester==='上學期'||ev.semester==='暑假') ? 'var(--accent)' : 'var(--teal)';
      const who = [ev.companion, ev.instructor].filter(Boolean).join('、');
      chipsHtml += `<div class="day-chip" style="background:${semColor}; cursor:pointer;" `+
        `data-sid="${escapeHtml(ev.sessionCardId)}" data-mkey="${escapeHtml(mKey)}" `+
        `title="點我跳到這筆場次・${escapeHtml(ev.startTime||'')}~${escapeHtml(ev.endTime||'')}${who?' · '+escapeHtml(who):''}">`+
        `<span class="day-chip-name">${escapeHtml(ev.startTime||'')}~${escapeHtml(ev.endTime||'')}${who?'　'+escapeHtml(who):''}</span>`+
        `</div>`;
    });
    cell.innerHTML = `<div class="d">${inMonth?dayNum:''}</div>${chipsHtml}`;
    // Delegate clicks on chips (not the whole cell)
    cell.querySelectorAll('.day-chip[data-sid]').forEach(chip=>{
      chip.addEventListener('click', e=>{
        e.stopPropagation();
        jumpToSession(chip.dataset.sid, chip.dataset.mkey);
      });
    });
    grid.appendChild(cell);
  }
}

// 12-month overview
function renderSchoolYearView(){

  const container = $('#schoolCalYearGrid');

    card.appendChild(hdr);

    const dowRow = document.createElement('div');
    dowRow.className = 'micro-dow-grid';
    ['日','一','二','三','四','五','六'].forEach(d=>{
      const el = document.createElement('div');
      el.className = 'micro-dow';
      el.textContent = d;
      dowRow.appendChild(el);
    });
    body.appendChild(dowRow);

    const cellGrid = document.createElement('div');
    cellGrid.className = 'micro-cell-grid';
    const firstDay = new Date(fm.y, fm.m-1, 1).getDay();
    const totalDays = new Date(fm.y, fm.m, 0).getDate();
    const totalCells = Math.ceil((firstDay+totalDays)/7)*7;
    for(let i=0;i<totalCells;i++){
      const dayNum = i - firstDay + 1;
      const cell = document.createElement('div');
      const inMonth = dayNum>=1 && dayNum<=totalDays;
      const dateKey = inMonth ? `${fm.y}-${String(fm.m).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}` : '';
      const dayEvs = inMonth ? (byDate[dateKey]||[]) : [];
      cell.className = 'micro-cell' + (inMonth ? '' : ' out') + (dayEvs.length ? ' has-event' : '');
      let dotsHtml = '';
      if(dayEvs.length){
        dotsHtml = `<div class="dot-row">${dayEvs.map(ev=>{
          const c = (ev.semester==='上學期'||ev.semester==='暑假') ? 'var(--accent)' : 'var(--teal)';
          return `<span class="micro-dot" style="background:${c};"></span>`;
        }).join('')}</div>`;
      }
      cell.innerHTML = inMonth ? `${dayNum}${dotsHtml}` : '';
      cellGrid.appendChild(cell);
    }
    body.appendChild(cellGrid);
    card.appendChild(body);

    // Click: jump into this month
    card.addEventListener('click', ()=>{
      activeMonthFilter = mKey;
      renderMonthFilterRow();
      applySessionMonthFilter();
      formCalYear = fm.y; formCalMonth = fm.m - 1;
      $('#schoolCalYearView').style.display = 'none';
      $('#schoolCalSingle').style.display = 'block';
      renderSchoolMiniCalendar();
    });

    container.appendChild(card);
  });
}

// Shows the school's required-hours target and how many hours have been
// filled in so far; red when short, green when met or exceeded.
function refreshHoursBar(actual){
  const bar = $('#hoursBar');
  if(!currentSchoolRef) { bar.style.display='none'; return; }
  const canonical = CANONICAL_SCHOOLS.find(c=>c.name===currentSchoolRef.name);
  if(!canonical || !canonical.targetHours){ bar.style.display='none'; return; }
  const target = canonical.targetHours;
  bar.style.display = 'flex';
  $('#hoursTarget').textContent = target;
  const actualVal = actual !== undefined ? actual :
    $$('#sessionList .session-card').reduce((s,r)=>s+computeHours(r.querySelector('.s-start').value, r.querySelector('.s-end').value),0);
  $('#hoursActual').textContent = fmtHoursTotal(actualVal);
  $('#hoursActual').style.color = actualVal >= target ? '#1E7D3A' : '#C0392B';
}

function logBasicInfoChange(schoolId, reason, before, after){
  const school = DATA.schools.find(s=>s.id===schoolId);
  if(!school) return;
  if(!Array.isArray(DATA.changeLog)) DATA.changeLog = [];
  DATA.changeLog.unshift({
    id: uid(),
    schoolId, schoolName: school.name,
    sessionId: null,
    isBasicInfo: true,
    timestamp: new Date().toISOString(),
    reason,
    deleted: false,
    acknowledged: false,
    before, after,
    hadVisitConflict: false,
    visitFlagsAtChange: null
  });
  if(DATA.changeLog.length > 200) DATA.changeLog.length = 200;
}

async function commitSaveSchool(school){
  const newArtists = getSimpleListValues('artists');
  const newTeachers = getSimpleListValues('teachers');
  const newGroups = getStudentGroupValues();
  const newTeacherContact = $('#f-teacher').value.trim();
  const newPhone = $('#f-phone').value.trim();

  if(currentBasicInfoEditReason){
    const before = {
      collaboratingArtists: school.collaboratingArtists||[],
      companionTeachers: school.companionTeachers||[],
      studentGroups: school.studentGroups||[],
      contactTeacher: school.contactTeacher||'',
      contactPhone: school.contactPhone||''
    };
    const after = { collaboratingArtists:newArtists, companionTeachers:newTeachers, studentGroups:newGroups, contactTeacher:newTeacherContact, contactPhone:newPhone };
    if(JSON.stringify(before) !== JSON.stringify(after)){
      logBasicInfoChange(school.id, currentBasicInfoEditReason, before, after);
    }
    currentBasicInfoEditReason = null;
  }

  school.collaboratingArtists = newArtists;
  school.companionTeachers = newTeachers;
  school.studentGroups = newGroups;
  school.contactTeacher = newTeacherContact;
  school.contactPhone = newPhone;
  school.basicInfoLocked = true;

  const sessions = $$('#sessionList .session-card').map(r=>{
    const id = r.dataset.id;
    const existing = (school.sessions||[]).find(s=>s.id===id) || {};
    const newVals = {
      semester: r.querySelector('.s-semester').value,
      date: getSessionDateValue(r),
      startTime: r.querySelector('.s-start').value,
      endTime: r.querySelector('.s-end').value,
      companionTeacher: r.querySelector('.s-companion').value.trim(),
      instructor: r.querySelector('.s-instructor').value.trim(),
      studentGrades: getSessionGradeValues(r),
      location: r.querySelector('.s-location').value.trim(),
      content: r.querySelector('.s-content').value.trim()
    };
    // This row was a previously-locked session that got unlocked via the
    // "✏️ 修改" + reason flow this session — log it if anything actually changed.
    if(r.dataset.everLocked === 'true' && r.dataset.editReason){
      const changed = Object.keys(SESSION_FIELD_LABELS).some(k=>{
        const ev = existing[k], nv = newVals[k];
        const evStr = Array.isArray(ev) ? ev.join('、') : String(ev||'');
        const nvStr = Array.isArray(nv) ? nv.join('、') : String(nv||'');
        return evStr !== nvStr;
      });
      if(changed) logSessionChange(school.id, id, r.dataset.editReason, false, newVals);
    }
    return {
      id,
      ...newVals,
      // visit-tracking flags are set from the 總覽彙整 admin view, not this
      // form — carry them over by id so re-saving the school form never wipes them.
      visitPlanned: !!existing.visitPlanned,
      visitConfirmed: !!existing.visitConfirmed,
      visitSuyu: !!existing.visitSuyu,
      visitEnjia: !!existing.visitEnjia,
      visitCommittee: !!existing.visitCommittee,
      locked: true
    };
  }).filter(s=>{
    // Skip completely-blank rows (e.g. the empty starter row) so saving never
    // creates a locked empty session. A row counts as real if it has a date,
    // any time, or any text content.
    return s.date || s.startTime || s.endTime || s.companionTeacher ||
           s.instructor || s.location || s.content ||
           (Array.isArray(s.studentGrades) && s.studentGrades.length>0);
  });

  // Rows removed during this editing session (after going through the
  // unlock/reason flow) — log their deletion now, at save time.
  pendingDeletions.forEach(pd=>logSessionChange(school.id, pd.sessionId, pd.reason, true, null));
  pendingDeletions = [];

  // Keep the on-screen session cards (and the saved order) in chronological order.
  sessions.sort((a,b)=>{
    const da = a.date || '9999-99-99', db = b.date || '9999-99-99';
    if(da !== db) return da < db ? -1 : 1;
    return (a.startTime||'99:99').localeCompare(b.startTime||'99:99');
  });

  school.sessions = sessions;
  school.updatedAt = new Date().toISOString();

  const ok = await saveData();
  if(ok){
    showToast('✓ 已儲存課程期程表');
    loadFormFor(school);
  }
}

function idForSchoolName(name){
  const idx = CANONICAL_SCHOOLS.findIndex(s=>s.name===name);
  return idx>=0 ? 's' + String(idx+1).padStart(2,'0') : null;
}

function countyRank(region, county){
  const order = COUNTY_ORDER[region] || [];
  const idx = order.indexOf(county);
  return idx === -1 ? order.length : idx;
}

// Groups CANONICAL_SCHOOLS (optionally filtered by category) by region,
// in REGION_ORDER order; within each region, sorted by the official county
// order, then alphabetically by school name within the same county.
function getRegionGroupedSchools(category){
  const filtered = category ? CANONICAL_SCHOOLS.filter(s=>s.category===category) : CANONICAL_SCHOOLS;
  const groups = {};
  REGION_ORDER.forEach(r=>groups[r]=[]);
  filtered.forEach(s=>{ groups[s.region].push(s); });
  REGION_ORDER.forEach(r=>{
    groups[r].sort((a,b)=>{
      const ca = countyRank(r, a.county), cb = countyRank(r, b.county);
      if(ca !== cb) return ca - cb;
      return a.name.localeCompare(b.name,'zh-Hant');
    });
  });
  return groups;
}

// Builds <option>/<optgroup> HTML for a school dropdown, grouped by region
// (北部→中部→南部→東部、離島), each region's schools ordered by county then name.
// useId: true -> option value is the stable school id (for the fill-panel selector)
// useId: false -> option value is the school name (for the admin name filter)
function buildSchoolOptionsHTML(category, opts){
  opts = opts || {};
  const groups = getRegionGroupedSchools(category);
  let html = `<option value="">${escapeHtml(opts.allLabel || '請選擇…')}</option>`;
  REGION_ORDER.forEach(region=>{
    const list = groups[region];
    if(!list || list.length===0) return;
    html += `<optgroup label="${escapeHtml(region)}">`;
    list.forEach(s=>{
      const value = opts.useId ? idForSchoolName(s.name) : s.name;
      html += `<option value="${escapeHtml(value)}">${escapeHtml(s.name)}</option>`;
    });
    html += '</optgroup>';
  });
  return html;
}

// Reconciles DATA.schools against the fixed 32-school roster every load:
// keeps any already-entered sessions/contact info (matched by exact name),
// assigns stable ids (s01..s32), and drops anything not on the official list.
function ensureCanonicalSchools(){
  DATA.schools = CANONICAL_SCHOOLS.map((c, idx)=>{
    const id = 's' + String(idx+1).padStart(2,'0');
    const existing = DATA.schools.find(s=>s.name===c.name);
    if(existing){
      return {
        id,
        name: c.name,
        category: VALID_CATEGORIES.includes(existing.category) ? existing.category : c.category,
        collaboratingArtists: migrateToList(existing.collaboratingArtists, existing.collaboratingArtist),
        companionTeachers: migrateToList(existing.companionTeachers, null),
        studentGroups: Array.isArray(existing.studentGroups) ? existing.studentGroups : [],
        contactTeacher: existing.contactTeacher || '',
        contactPhone: existing.contactPhone || '',
        basicInfoLocked: !!existing.basicInfoLocked,
        sessions: Array.isArray(existing.sessions) ? existing.sessions : [],
        updatedAt: existing.updatedAt || null
      };
    }
    return { id, name: c.name, category: c.category, collaboratingArtists:[], companionTeachers:[], studentGroups:[], contactTeacher:'', contactPhone:'', basicInfoLocked:false, sessions:[], updatedAt:null };
  });
  DATA.targetSchoolCount = CANONICAL_SCHOOLS.length;
  if(!Array.isArray(DATA.changeLog)) DATA.changeLog = [];
}

// Migrates an old single-string field (e.g. collaboratingArtist:"陳老師") into
// the new list format, while passing an already-list value straight through.
function migrateToList(listVal, oldStringVal){
  if(Array.isArray(listVal)) return listVal;
  if(oldStringVal) return [oldStringVal];
  return [];
}

const SESSION_FIELD_LABELS = {
  semester: '學期', date: '日期', startTime: '開始時間', endTime: '結束時間',
  companionTeacher: '隨課老師', instructor: '授課藝師', studentGrades: '學生年級', location: '上課地點', content: '上課內容'
};

// Records a change to a previously-locked (already-saved) session — either an
// edit (afterValues given) or a deletion (isDeleted=true). Flags hadVisitConflict
// when the session had any 訪視 checkbox ticked and its date/time actually moved,
// so the admin overview can surface it as something that may break a planned visit.
function logSessionChange(schoolId, sessionId, reason, isDeleted, afterValues){
  const school = DATA.schools.find(s=>s.id===schoolId);
  if(!school) return;
  const before = (school.sessions||[]).find(s=>s.id===sessionId);
  if(!before) return;

  const hadVisitFlag = VISIT_FLAGS.some(f=>before[f.field]);
  let hadVisitConflict = false;
  if(hadVisitFlag){
    if(isDeleted){
      hadVisitConflict = true;
    }else if(afterValues){
      hadVisitConflict = before.date !== afterValues.date ||
        before.startTime !== afterValues.startTime ||
        before.endTime !== afterValues.endTime;
    }
  }

  if(!Array.isArray(DATA.changeLog)) DATA.changeLog = [];
  DATA.changeLog.unshift({
    id: uid(),
    schoolId, schoolName: school.name,
    sessionId,
    timestamp: new Date().toISOString(),
    reason,
    deleted: !!isDeleted,
    acknowledged: false,
    before: {
      semester: before.semester, date: before.date, startTime: before.startTime, endTime: before.endTime,
      companionTeacher: before.companionTeacher, instructor: before.instructor, location: before.location, content: before.content
    },
    after: isDeleted ? null : afterValues,
    hadVisitConflict,
    visitFlagsAtChange: {
      visitPlanned: !!before.visitPlanned, visitConfirmed: !!before.visitConfirmed,
      visitSuyu: !!before.visitSuyu, visitEnjia: !!before.visitEnjia, visitCommittee: !!before.visitCommittee
    }
  });
  if(DATA.changeLog.length > 200) DATA.changeLog.length = 200;
}

const CATEGORY_COLORS = {
  '音樂班': '#B33A3A',
  '舞蹈班': '#D1722F',
  '美術班': '#C9A227',
  '普通班': '#8C5A3C'
};

const VISIT_FLAGS = [
  {field:'visitPlanned',   label:'訪視預計', color:'#4A7A9E'},
  {field:'visitConfirmed', label:'訪視確定', color:'#1CA3B8'},
  {field:'visitSuyu',      label:'素瑜',     color:'#2E8B6B'},
  {field:'visitEnjia',     label:'恩嘉',     color:'#9B59B6'},
  {field:'visitCommittee', label:'委員',     color:'#5654A2'}
];

// Taiwan academic-year grouping: 上學期 runs 8/1–次年1/31 (includes 暑假),
// 下學期 runs 2/1–7/31 (includes 寒假) — so for admin-side aggregation,
// 暑假 sessions count toward 上學期 and 寒假 sessions count toward 下學期.
function normalizeSemester(raw){
  if(raw === '暑假') return '上學期';
  if(raw === '寒假') return '下學期';
  return raw;
}

// "已訪視" is driven directly by the 訪視確定 checkbox — it does not require
// the session date to already be in the past. The whole 115學年度 program
// runs in the future relative to today, so gating on "date already passed"
// would mean ticking the box could never move the stat until the date arrives.
function isSchoolSemesterVisited(school, semester){
  return (school.sessions||[]).some(s=>normalizeSemester(s.semester)===semester && s.visitConfirmed);
}

// For a given event (session), if it has 訪視確定 ticked, returns its order
// among that school+semester's confirmed visits (1st, 2nd, ...) sorted by
// date — used to label "第2次訪視" etc. directly on the repeat session(s).
function getVisitOrderInfo(ev){
  if(!ev.visitConfirmed) return null;
  const school = DATA.schools.find(s=>s.id===ev.schoolId);
  if(!school) return null;
  const sem = normalizeSemester(ev.semester);
  const confirmed = (school.sessions||[])
    .filter(s=>normalizeSemester(s.semester)===sem && s.visitConfirmed)
    .sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const idx = confirmed.findIndex(s=>s.id===ev.sessionId);
  if(idx < 0) return null;
  return { visitNumber: idx+1, isRepeat: confirmed.length>=2 };
}

let changeLogShowAll = false;

function fmtChangeField(label, before, after){
  if(String(before||'')===String(after||'')) return '';
  return `<div>${escapeHtml(label)}：<s>${escapeHtml(before||'（空白）')}</s> → <strong>${escapeHtml(after||'（空白）')}</strong></div>`;

function renderChangeLogEntry(entry){
  const when = new Date(entry.timestamp).toLocaleString('zh-TW');
  const conflictBanner = entry.hadVisitConflict
    ? `<div style="color:var(--danger); font-weight:700; margin-bottom:4px;">⚠️ 這筆原本已排定訪視，請確認新時間是否仍能訪視</div>`
    : '';
  let diffHtml;
  if(entry.isBasicInfo){
    const b = entry.before, a = entry.after;
    diffHtml = [
      fmtChangeField('配合藝師', (b.collaboratingArtists||[]).join('、'), (a.collaboratingArtists||[]).join('、')),
      fmtChangeField('隨課老師', (b.companionTeachers||[]).join('、'), (a.companionTeachers||[]).join('、')),
      fmtChangeField('學生總數', (b.studentGroups||[]).map(g=>`${g.grade||''}${g.count||0}位`).join('、'), (a.studentGroups||[]).map(g=>`${g.grade||''}${g.count||0}位`).join('、')),
      fmtChangeField('承辦老師', b.contactTeacher, a.contactTeacher),
      fmtChangeField('聯絡電話', b.contactPhone, a.contactPhone)
    ].filter(Boolean).join('') || '<div style="color:var(--ink-faint);">（欄位內容相同，無差異）</div>';
  }else if(entry.deleted){
    const b = entry.before;
    diffHtml = `<div style="color:var(--danger);">此場次已被刪除（原訂：${b.date?fmtDateDisplay(b.date):'（未填日期）'} ${b.startTime||''}~${b.endTime||''}）</div>`;
  }else{
    const b = entry.before, a = entry.after;
    diffHtml = [
      fmtChangeField('日期', b.date?fmtDateDisplay(b.date):'', a.date?fmtDateDisplay(a.date):''),
      fmtChangeField('時間', b.startTime?`${b.startTime}~${b.endTime}`:'', a.startTime?`${a.startTime}~${a.endTime}`:''),
      fmtChangeField('學期', b.semester, a.semester),
      fmtChangeField('隨課老師', b.companionTeacher, a.companionTeacher),
      fmtChangeField('授課藝師', b.instructor, a.instructor),
      fmtChangeField('學生年級', (b.studentGrades||[]).join('、'), (a.studentGrades||[]).join('、')),
      fmtChangeField('上課地點', b.location, a.location),
      fmtChangeField('上課內容', b.content, a.content)
    ].filter(Boolean).join('') || '<div style="color:var(--ink-faint);">（欄位內容相同，無差異）</div>';
  }
  const flagNames = entry.visitFlagsAtChange
    ? VISIT_FLAGS.filter(f=>entry.visitFlagsAtChange[f.field]).map(f=>f.label).join('、')
    : '';
  const visitFlagsNote = entry.hadVisitConflict
    ? `<div class="meta" style="margin-top:2px;">原本標記：${escapeHtml(flagNames||'（無）')}</div>`
    : '';
  return `<div class="changelog-item${entry.hadVisitConflict?' conflict':''}">
    <div class="changelog-meta">${escapeHtml(entry.schoolName)}${entry.isBasicInfo?'<br><span style="font-size:11px;">（學校基本資料）</span>':''}<br>${when}</div>
    <div class="ev-main" style="flex:1;">
      ${conflictBanner}
      <div class="changelog-diff">${diffHtml}</div>
      ${visitFlagsNote}
      <div class="meta" style="margin-top:4px;">修改原因：${escapeHtml(entry.reason||'（未提供）')}</div>
      ${!entry.acknowledged ? `<button class="btn btn-ghost btn-sm ackBtn" data-id="${entry.id}" style="margin-top:6px;">✓ 已確認</button>` : `<span style="font-size:11px;color:var(--ink-faint);">已確認</span>`}
    </div>
  </div>`;
}

async function renderChangeLog(){
  const badge = $('#changeLogUnreadBadge');
  const body = $('#changeLogBody');
  const log = Array.isArray(DATA.changeLog) ? DATA.changeLog : [];
  const unread = log.filter(e=>!e.acknowledged);

  if(unread.length>0){
    badge.textContent = `${unread.length} 筆未確認`;
    badge.style.display = 'inline-block';
  }else{
    badge.style.display = 'none';
  }

  $('#changeLogShowAllBtn').textContent = changeLogShowAll ? '只看未確認' : '顯示全部';

  const list = changeLogShowAll ? log : unread;
  if(list.length===0){
    body.innerHTML = `<p style="color:var(--ink-faint); font-size:13px; margin:8px 0 0;">${changeLogShowAll?'目前沒有任何異動紀錄。':'目前沒有未確認的異動，太好了！'}</p>`;
    return;
  }
  const sorted = list.slice().sort((a,b)=>{
    if(!!a.hadVisitConflict !== !!b.hadVisitConflict) return a.hadVisitConflict ? -1 : 1;
    return new Date(b.timestamp) - new Date(a.timestamp);
  });
  body.innerHTML = sorted.map(renderChangeLogEntry).join('');

  $$('#changeLogBody .ackBtn').forEach(btn=>{
    btn.addEventListener('click', async ()=>{
      const entry = DATA.changeLog.find(e=>e.id===btn.dataset.id);
      if(!entry) return;
      entry.acknowledged = true;
      const ok = await saveData();
      if(ok) renderChangeLog();
    });
  });
}

function matchesFilter(ev){
  const schoolName = $('#schoolNameFilter').value;
  if(schoolName && ev.schoolName !== schoolName) return false;
  const category = $('#categoryFilter').value;
  if(category && ev.category !== category) return false;
  const semester = $('#semesterFilter').value;
  if(semester && normalizeSemester(ev.semester) !== semester) return false;
  return true;
}

function getFilteredEventsFixed(){
  return getAllEvents().filter(matchesFilter);
}

// One-time delegated listener: handles every visit checkbox in the list,
// including rows re-rendered later, since it's bound to the table body itself.
$('#listTbody')&&$('#listTbody').addEventListener('change', (e)=>{
  const t = e.target;
  if(!t.matches || !t.matches('input[type=checkbox][data-field]')) return;
  const school = DATA.schools.find(s=>s.id===t.dataset.schoolId);
  if(!school) return;
  const session = (school.sessions||[]).find(s=>s.id===t.dataset.sessionId);
  if(!session) return;
  session[t.dataset.field] = t.checked;
  scheduleVisitSave();
  renderStats();

});

function escapeHtml(str){
  if(!str) return '';
  return str.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function clampToProgramRange(){
  const cur = calYear*12+calMonth, lo = PROGRAM_START.y*12+PROGRAM_START.m, hi = PROGRAM_END.y*12+PROGRAM_END.m;
  if(cur < lo){ calYear = PROGRAM_START.y; calMonth = PROGRAM_START.m; }
  if(cur > hi){ calYear = PROGRAM_END.y; calMonth = PROGRAM_END.m; }
}

function renderAdminYearView(){
  const allEvents = getFilteredEventsFixed();
  const byDate = {};
  allEvents.forEach(ev=>{ if(ev.date)(byDate[ev.date]=byDate[ev.date]||[]).push(ev); });

  const container = $('#adminCalYearGrid');
  container.innerHTML = '';

  FORM_MONTHS.forEach(fm=>{
    const semClass = fm.sem==='上' ? 'sem-upper' : 'sem-lower';
    const mKey = `${fm.y}-${String(fm.m).padStart(2,'0')}`;
    const card = document.createElement('div');
    card.className = 'mini-month-card';

    const hdr = document.createElement('div');
    hdr.className = `mini-month-header ${semClass}`;
    const count = allEvents.filter(ev=>ev.date && ev.date.startsWith(mKey)).length;
    hdr.innerHTML = `<span>${fm.y}年${fm.m}月</span>${count?`<span style="font-size:11px;opacity:.9;">${count}場課</span>`:''}`;
    card.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'mini-month-body';
    const dowRow = document.createElement('div');
    dowRow.className = 'micro-dow-grid';
    ['日','一','二','三','四','五','六'].forEach(d=>{
      const el = document.createElement('div');
      el.className = 'micro-dow'; el.textContent = d;
      dowRow.appendChild(el);
    });
    body.appendChild(dowRow);

    const cellGrid = document.createElement('div');
    cellGrid.className = 'micro-cell-grid';
    const firstDay = new Date(fm.y, fm.m-1, 1).getDay();
    const totalDays = new Date(fm.y, fm.m, 0).getDate();
    const totalCells = Math.ceil((firstDay+totalDays)/7)*7;
    for(let i=0;i<totalCells;i++){
      const dayNum = i - firstDay + 1;
      const cell = document.createElement('div');
      const inMonth = dayNum>=1 && dayNum<=totalDays;
      const dateKey = inMonth ? `${fm.y}-${String(fm.m).padStart(2,'0')}-${String(dayNum).padStart(2,'0')}` : '';
      const dayEvs = inMonth ? (byDate[dateKey]||[]) : [];
      cell.className = 'micro-cell' + (inMonth?'':' out') + (dayEvs.length?' has-event':'');
      let dotsHtml = '';
      if(dayEvs.length){
        dotsHtml = `<div class="dot-row">${dayEvs.map(ev=>{
          const c = CATEGORY_COLORS[ev.category]||'var(--ink-faint)';
          return `<span class="micro-dot" style="background:${c};"></span>`;
        }).join('')}</div>`;
      }
      cell.innerHTML = inMonth ? `${dayNum}${dotsHtml}` : '';
      cellGrid.appendChild(cell);
    }
    body.appendChild(cellGrid);
    card.appendChild(body);

    card.addEventListener('click', ()=>{
      activeAdminMonthFilter = mKey;
      calYear = fm.y; calMonth = fm.m - 1;
      selectedDayKey = null;
      renderAdminMonthFilterRow();
      $('#adminCalYearView').style.display = 'none';
      $('#adminCalSingle').style.display = 'block';
      renderCalendar();
      renderMonthList();
    });

    container.appendChild(card);
  });
}

function renderCalendar(){
  if(calYear===undefined){ calYear = PROGRAM_START.y; calMonth = PROGRAM_START.m; }
  clampToProgramRange();
  $('#calMonthLabel').textContent = `${calYear} 年 ${calMonth+1} 月`;
  $('#calPrev').disabled = (calYear*12+calMonth <= PROGRAM_START.y*12+PROGRAM_START.m);
  $('#calNext').disabled = (calYear*12+calMonth >= PROGRAM_END.y*12+PROGRAM_END.m);

  const dowEl = $('#calDow');
  dowEl.innerHTML = '';
  ['日','一','二','三','四','五','六'].forEach(d=>{
    const el = document.createElement('div');
    el.className = 'cal-dow';
    el.textContent = d;
    dowEl.appendChild(el);
  });

  const events = getFilteredEventsFixed();
  const byDate = {};
  events.forEach(ev=>{
    if(!ev.date) return;
    (byDate[ev.date] = byDate[ev.date]||[]).push(ev);
  });

  const firstOfMonth = new Date(calYear, calMonth, 1);
  const startWeekday = firstOfMonth.getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const todayStr = todayDateKey();

  const grid = $('#calGrid');
  grid.innerHTML = '';

  const totalCells = Math.ceil((startWeekday + daysInMonth)/7)*7;
  for(let i=0;i<totalCells;i++){
    const dayNum = i - startWeekday + 1;
    const cell = document.createElement('div');
    const inMonth = dayNum>=1 && dayNum<=daysInMonth;
    const dateKey = inMonth ? toDateKey(calYear, calMonth+1, dayNum) : '';
    cell.className = 'cal-cell' + (inMonth?'':' out') + (dateKey && dateKey===todayStr?' today':'') + (dateKey && dateKey===selectedDayKey?' selected':'');
    const dayEvents = (byDate[dateKey]||[]).sort((a,b)=>(a.startTime||'').localeCompare(b.startTime||''));
    let chipsHtml = '';
    dayEvents.forEach(ev=>{
      const catColor = CATEGORY_COLORS[ev.category] || 'var(--ink-faint)';
      chipsHtml += `<div class="day-chip-wrap">`+
        `<div class="day-chip" style="background:${catColor};" title="${escapeHtml(ev.schoolName)}（${escapeHtml(ev.category||'')}）">`+
        `<span class="day-chip-name">${escapeHtml(ev.schoolName)}</span>`+
        `</div>`+
        flagBarHTML(ev)+
        `</div>`;
    });
    cell.innerHTML = `<div class="d">${inMonth?dayNum:''}</div>${chipsHtml}`;
    if(inMonth){
      cell.addEventListener('click', ()=>{
        selectedDayKey = (selectedDayKey === dateKey) ? null : dateKey;
        renderCalendar();
      });
    }
    grid.appendChild(cell);
  }

  renderMonthList();
}

function renderMonthList(){
  const titleEl = $('#monthListTitle');
  const bodyEl = $('#monthListBody');

  $('#monthListAllBtn').classList.toggle('active', monthListFilter==='all');
  $('#monthListConfirmedBtn').classList.toggle('active', monthListFilter==='confirmed');

  // Scope: the whole displayed month, narrowed to one day if selected.
  const monthPrefix = `${calYear}-${String(calMonth+1).padStart(2,'0')}`;
  let events = getFilteredEventsFixed().filter(ev=>ev.date && ev.date.startsWith(monthPrefix));
  if(selectedDayKey) events = events.filter(ev=>ev.date===selectedDayKey);
  if(monthListFilter==='confirmed') events = events.filter(ev=>ev.visitConfirmed);
  events.sort((a,b)=>{
    if(a.date!==b.date) return a.date<b.date?-1:1;
    return (a.startTime||'').localeCompare(b.startTime||'');
  });

  const scopeLabel = selectedDayKey
    ? `${fmtDateDisplay(selectedDayKey)} <button class="chip-link" id="clearDaySelectBtn" style="margin-left:6px;">(顯示整個月)</button>`
    : `${calYear} 年 ${calMonth+1} 月`;
  const filterLabel = monthListFilter==='confirmed' ? '・僅訪視確定' : '';
  titleEl.innerHTML = `${scopeLabel}${filterLabel}（共 ${events.length} 場）`;

  const clearBtn = $('#clearDaySelectBtn');
  if(clearBtn) clearBtn.addEventListener('click', (e)=>{ e.stopPropagation(); selectedDayKey=null; renderCalendar(); });

  if(events.length===0){
    bodyEl.innerHTML = `<p style="color:var(--ink-faint);font-size:13px;margin:8px 0 0;">沒有符合條件的課程場次。</p>`;
    return;
  }

  bodyEl.innerHTML = events.map(ev=>{
    const catColor = CATEGORY_COLORS[ev.category] || 'var(--ink-soft)';
    const flags = VISIT_FLAGS.filter(f=>ev[f.field]);
    const order = getVisitOrderInfo(ev);
    const visitNumTag = order ? `<span class="repeat-tag">第${order.visitNumber}次訪視</span>` : '';
    const visitLine = (flags.length || visitNumTag)
      ? `<div class="meta" style="display:flex; gap:6px; flex-wrap:wrap; align-items:center; margin-top:3px;">${flags.map(f=>`<span style="display:inline-flex;align-items:center;gap:3px;color:${f.color};font-weight:700;"><span class="flag-dot" style="background:${f.color};"></span>${escapeHtml(f.label)}</span>`).join('')}${visitNumTag}</div>`
      : '';
    return `<div class="ev-item">
      <div class="ev-time">${fmtDateDisplay(ev.date)}<br>${ev.startTime||'–'}~${ev.endTime||'–'}</div>
      <div class="ev-main">
        <span class="sname" style="color:${catColor};">${escapeHtml(ev.schoolName)}</span> · ${escapeHtml(ev.companionTeacher||'（未填隨課老師）')}
        <div class="meta">${escapeHtml(ev.instructor||'')}${ev.instructor&&ev.location?' · ':''}${escapeHtml(ev.location||'')}</div>
        ${visitLine}
      </div>
    </div>`;
  }).join('');
}

$('#monthListAllBtn')&&$('#monthListAllBtn').addEventListener('click', ()=>{ monthListFilter='all'; renderMonthList(); });
$('#monthListConfirmedBtn')&&$('#monthListConfirmedBtn').addEventListener('click', ()=>{ monthListFilter='confirmed'; renderMonthList(); });

/* ---------------- export ---------------- */

function icsEscape(str){
  return (str||'').replace(/\\/g,'\\\\').replace(/;/g,'\\;').replace(/,/g,'\\,').replace(/\n/g,'\\n');
}
function pad(n){ return n.toString().padStart(2,'0'); }

function buildICS(events){
  const lines = [];
  lines.push('BEGIN:VCALENDAR');
  lines.push('VERSION:2.0');
  lines.push('PRODID:-//CourseScheduleApp//ZH-TW//');
  lines.push('CALSCALE:GREGORIAN');
  lines.push('BEGIN:VTIMEZONE');
  lines.push('TZID:Asia/Taipei');
  lines.push('BEGIN:STANDARD');
  lines.push('DTSTART:19700101T000000');
  lines.push('TZOFFSETFROM:+0800');
  lines.push('TZOFFSETTO:+0800');
  lines.push('TZNAME:CST');
  lines.push('END:STANDARD');
  lines.push('END:VTIMEZONE');

  const now = new Date();
  const stamp = `${now.getUTCFullYear()}${pad(now.getUTCMonth()+1)}${pad(now.getUTCDate())}T${pad(now.getUTCHours())}${pad(now.getUTCMinutes())}${pad(now.getUTCSeconds())}Z`;

  events.forEach((ev,idx)=>{
    if(!ev.date) return;
    const datePart = ev.date.replace(/-/g,'');
    const start = ev.startTime ? ev.startTime.replace(':','') + '00' : '090000';
    const end = ev.endTime ? ev.endTime.replace(':','') + '00' : '100000';
    const summary = `${ev.schoolName}｜${ev.companionTeacher||'課程'}`;
    const descParts = [];
    if(ev.instructor) descParts.push(`授課藝師：${ev.instructor}`);
    if(ev.semester) descParts.push(`學期：${ev.semester}`);
    if(ev.content) descParts.push(`內容：${ev.content}`);
    if(ev.category) descParts.push(`類別：${ev.category}`);
    if(ev.collaboratingArtist) descParts.push(`配合藝師：${ev.collaboratingArtist}`);
    if(ev.studentInfo) descParts.push(`學生人數/年級：${ev.studentInfo}`);
    lines.push('BEGIN:VEVENT');
    lines.push(`UID:${ev.schoolId}-${ev.date}-${ev.startTime||idx}-${idx}@course-schedule-app`);
    lines.push(`DTSTAMP:${stamp}`);
    lines.push(`DTSTART;TZID=Asia/Taipei:${datePart}T${start}`);
    lines.push(`DTEND;TZID=Asia/Taipei:${datePart}T${end}`);
    lines.push(`SUMMARY:${icsEscape(summary)}`);
    if(ev.location) lines.push(`LOCATION:${icsEscape(ev.location)}`);
    if(descParts.length) lines.push(`DESCRIPTION:${icsEscape(descParts.join('\\n'))}`);
    lines.push('END:VEVENT');
  });

  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}

function downloadFile(filename, content, mime){
  const blob = new Blob([content], {type: mime});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}

$('#exportIcsBtn')&&$('#exportIcsBtn').addEventListener('click', ()=>{
  const events = getFilteredEventsFixed().filter(e=>e.date);
  if(events.length===0){ showToast('目前篩選條件下沒有可匯出的場次'); return; }
  const ics = buildICS(events);
  downloadFile('課程期程表.ics', ics, 'text/calendar;charset=utf-8');
  showToast(`✓ 已匯出 ${events.length} 筆場次（.ics）`);
});

$('#exportCsvBtn')&&$('#exportCsvBtn').addEventListener('click', ()=>{
  const events = getFilteredEventsFixed();
  if(events.length===0){ showToast('目前篩選條件下沒有可匯出的場次'); return; }
  const header = ['學校','類別','配合藝師','學生人數/年級','學期','日期','開始時間','結束時間','隨課老師','授課藝師','上課地點','上課內容'];
  const csvEscape = (v)=>{
    v = (v==null?'':String(v));
    if(/[",\n]/.test(v)) v = '"' + v.replace(/"/g,'""') + '"';
    return v;
  };
  const rows = events.sort((a,b)=>(a.date||'').localeCompare(b.date||'')).map(ev=>[
    ev.schoolName, ev.category, ev.collaboratingArtist, ev.studentInfo, ev.semester, ev.date, ev.startTime, ev.endTime, ev.companionTeacher, ev.instructor, ev.location, ev.content
  ].map(csvEscape).join(','));
  const csv = '\uFEFF' + header.join(',') + '\r\n' + rows.join('\r\n');
  downloadFile('課程期程表彙整.csv', csv, 'text/csv;charset=utf-8');
  showToast(`✓ 已匯出 ${events.length} 筆場次（CSV）`);
});

/* ---------------- init ---------------- */



/* ================= Supabase 資料層 ================= */

function dbRowToSession(r){
  return {
    id: r.id, semester: r.semester, date: r.date,
    startTime: r.start_time, endTime: r.end_time,
    companionTeacher: r.companion_teacher||'', instructor: r.instructor||'',
    studentGrades: r.student_grades||[], location: r.location||'', content: r.content||'',
    visitPlanned: r.visit_planned||false, visitConfirmed: r.visit_confirmed||false,
    visitSuyu: r.visit_suyu||false, visitEnjia: r.visit_enjia||false,
    visitCommittee: r.visit_committee||false, locked: r.locked||false
  };
}

function schoolRowToObj(school, sessions){
  return {
    id: school.id, name: school.name, category: school.category,
    region: school.region, county: school.county, targetHours: school.target_hours,
    collaboratingArtists: school.collaborating_artists||[],
    companionTeachers: school.companion_teachers||[],
    studentGroups: school.student_groups||[],
    contactTeacher: school.contact_teacher||'', contactPhone: school.contact_phone||'',
    basicInfoLocked: school.basic_info_locked||false,
    sessions: (sessions||[]).map(dbRowToSession),
    updatedAt: school.updated_at
  };
}

async function loadData(){
  if(SCHOOL_ID){
    // 填表頁：只載入這一所學校
    const school = await getSchool(SCHOOL_ID);
    if(!school){ showToast('找不到此學校，請確認連結是否正確'); DATA.schools=[]; return; }
    const sessions = await getSessionsBySchool(SCHOOL_ID);
    DATA.schools = [ schoolRowToObj(school, sessions) ];
  }else{
    // 總覽頁：載入全部
    const schools = await getAllSchools();
    const sessions = await getAllSessions();
    const bySchool = {};
    (sessions||[]).forEach(s=>{ (bySchool[s.school_id]=bySchool[s.school_id]||[]).push(s); });
    DATA.schools = (schools||[]).map(sc => schoolRowToObj(sc, bySchool[sc.id]||[]));
    // change_log 單獨處理，失敗不影響學校資料顯示
    try{
      const logs = await getChangeLogs(false);
      DATA.changeLog = (logs||[]).map(r=>({
        id:r.id, schoolId:r.school_id, schoolName:r.school_name, sessionId:r.session_id,
        isBasicInfo:r.is_basic_info, timestamp:r.timestamp, reason:r.reason,
        deleted:r.deleted, acknowledged:r.acknowledged,
        before:r.before_data, after:r.after_data,
        hadVisitConflict:r.had_visit_conflict, visitFlagsAtChange:r.visit_flags_at_change
      }));
    }catch(e){ console.error('changeLog load error', e); DATA.changeLog = []; }
  }
}

async function saveData(){
  const school = DATA.schools.find(s=>s.id===currentSchoolId) || DATA.schools[0];
  if(!school) return false;
  try{
    await updateSchool(school.id, {
      collaborating_artists: school.collaboratingArtists,
      companion_teachers: school.companionTeachers,
      student_groups: school.studentGroups,
      contact_teacher: school.contactTeacher,
      contact_phone: school.contactPhone,
      basic_info_locked: school.basicInfoLocked,
      updated_at: new Date().toISOString()
    });
    // 刪除已移除的場次
    const existing = await getSessionsBySchool(school.id);
    const keepIds = school.sessions.map(s=>s.id);
    for(const r of (existing||[])){
      if(!keepIds.includes(r.id)) await deleteSession(r.id);
    }
    // upsert 現有場次
    if(school.sessions.length){
      const rows = school.sessions.map((s,i)=>({
        id:s.id, school_id:school.id, semester:s.semester||'',
        date:s.date||null, start_time:s.startTime||null, end_time:s.endTime||null,
        companion_teacher:s.companionTeacher||'', instructor:s.instructor||'',
        student_grades:s.studentGrades||[], location:s.location||'', content:s.content||'',
        visit_planned:!!s.visitPlanned, visit_confirmed:!!s.visitConfirmed,
        visit_suyu:!!s.visitSuyu, visit_enjia:!!s.visitEnjia, visit_committee:!!s.visitCommittee,
        locked:!!s.locked, sort_order:i
      }));
      await upsertSessions(rows);
    }
    // 寫入新的異動紀錄
    if(Array.isArray(DATA.changeLog) && DATA.changeLog.length){
      const existingLogs = await getChangeLogs(false);
      const seen = new Set((existingLogs||[]).map(l=>l.id));
      for(const l of DATA.changeLog){
        if(seen.has(l.id)) continue;
        await insertChangeLog({
          id:l.id, school_id:l.schoolId, school_name:l.schoolName||'',
          session_id:l.sessionId||null, is_basic_info:!!l.isBasicInfo,
          timestamp:l.timestamp, reason:l.reason||'', deleted:!!l.deleted,
          acknowledged:!!l.acknowledged, before_data:l.before||null, after_data:l.after||null,
          had_visit_conflict:!!l.hadVisitConflict, visit_flags_at_change:l.visitFlagsAtChange||null
        });
      }
    }
    return true;
  }catch(e){
    console.error('saveData error', e);
    showToast('⚠️ 儲存失敗：'+e.message);
    return false;
  }
}

/* ================= init ================= */

function showLoading(show){
  const l=$('#loading'), c=$('#content');
  if(l) l.style.display = show?'block':'none';
  if(c) c.style.display = show?'none':'block';
}

async function init(){
  showLoading(true);
  try{
    await loadData();
    if(SCHOOL_ID){
      // 填表頁
      const school = DATA.schools.find(s=>s.id===SCHOOL_ID);
      if(school){
        currentSchoolId = SCHOOL_ID;
        loadFormFor(school);
        const fa=$('#formArea'); if(fa) fa.style.display='block';
        // 每校一網址，不需要選校卡片，整張隱藏
        const pc=$('#schoolPickerCard'); if(pc) pc.style.display='none';
        // 隱藏選校後，區塊編號重新從 1 開始（基本資料=1、課程場次=2）
        const nums = document.querySelectorAll('#formArea .card-title .num');
        if(nums[0]) nums[0].textContent = '1';
        if(nums[1]) nums[1].textContent = '2';
        // 顯示學校名稱 banner
        const bn=$('#bannerName'), bc=$('#bannerCategory');
        if(bn) bn.textContent = school.name;
        if(bc){
          bc.textContent = school.category;
          const cc={'音樂班':'#B33A3A','舞蹈班':'#D1722F','美術班':'#C9A227','普通班':'#8C5A3C'};
          bc.style.background = cc[school.category]||'#888'; bc.style.color='#fff';
        }
      }else{
        showToast('找不到此學校，請確認連結是否正確');
      }
    }else{
      // 總覽頁
      if(typeof refreshAdminSchoolNameOptions==='function') refreshAdminSchoolNameOptions();
      renderAdmin();
    }
  }catch(e){
    console.error('init error', e);
    showToast('載入失敗：'+e.message);
  }
  showLoading(false);
}

init();

})();
