<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>藝師藝有計畫 115學年度</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Noto Sans TC',sans-serif;background:#F7F4EF;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
  .card{background:#fff;border-radius:16px;padding:40px 36px;max-width:480px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.08);}
  h1{font-size:22px;font-weight:700;color:#2A2622;margin-bottom:6px;}
  p{color:#6B6560;font-size:14px;line-height:1.7;margin-bottom:28px;}
  .btn{display:block;width:100%;padding:14px;border-radius:10px;font-size:15px;font-weight:600;text-align:center;text-decoration:none;cursor:pointer;border:none;}
  .btn-primary{background:#C98A2B;color:#fff;margin-bottom:12px;}
  .btn-outline{background:#fff;color:#2A2622;border:1.5px solid #DDD8D0;}
  .btn:hover{opacity:.88;}
  .notice{margin-top:24px;font-size:12px;color:#AAA5A0;text-align:center;}
</style>
</head>
<body>
<div class="card">
  <h1>教育部藝師藝有計畫</h1>
  <p>115 學年度課程期程表系統<br>請使用學校專屬連結填寫課程資料。</p>
  <a href="/admin" class="btn btn-outline">📊 總覽彙整（計畫方使用）</a>
  <p class="notice">如需各校專屬填表連結，請聯繫計畫主辦方。</p>
</div>
</body>
</html>
